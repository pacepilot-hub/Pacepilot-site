<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacePilot</title>
    <style>
      :root {
        --bg: #0b0b0c;
        --surface: #141417;
        --text: #f2f2f2;
        --muted: #b9b9bf;
        --accent: #ef3b00;
        --border: #24242a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top right, #1a1a20 0%, var(--bg) 45%);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
      }
      h1 { margin: 0 0 10px; font-size: 2rem; }
      p { color: var(--muted); line-height: 1.6; }
      .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
      a.btn {
        display: inline-block;
        text-decoration: none;
        color: white;
        background: var(--accent);
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
      }
      a.link {
        color: var(--muted);
        text-decoration: underline;
      }
      footer { margin-top: 18px; font-size: 0.9rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>PacePilot</h1>
        <p>
          PacePilot, application de coaching sportif personnalisee,
          est editee par PaceLabs.
          Cette page sert de vitrine simple pour les stores.
        </p>
        <div class="links">
          <a class="btn" href="privacy.html">Politique de confidentialite</a>
          <a class="btn" href="support.html">Support</a>
        </div>
        <footer>
          Application editee par PaceLabs<br />
          Contact: <a class="link" href="mailto:support@pacepilot.app">support@pacepilot.app</a>
        </footer>
      </section>
    </main>
  </body>
</html>
